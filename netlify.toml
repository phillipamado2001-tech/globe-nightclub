[build]
  publish = "."

# Cache static assets aggressively
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=300"

# SPA-style redirect for clean URLs
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
